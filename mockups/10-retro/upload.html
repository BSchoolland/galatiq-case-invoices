<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Upload · Galatiq Accounts Payable</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Frijole&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .stage {
    min-height: calc(100vh - 70px - 110px);
    display: grid; place-items: center;
    padding: 56px 0;
  }
  .up-wrap { width: 100%; max-width: 680px; text-align: center; }

  .eyebrow {
    font-size: 12px; font-weight: 700; letter-spacing: .22em; text-transform: uppercase;
    color: var(--mustard-deep); margin: 0 0 16px;
  }
  .up-title {
    font-family: var(--display); font-size: clamp(30px, 4.4vw, 46px);
    color: var(--sienna); margin: 0; line-height: 1.08; letter-spacing: .01em;
  }

  .dropzone {
    margin: 38px 0 0;
    display: flex; flex-direction: column; align-items: center;
    padding: 72px 48px;
    border-radius: var(--r-lg);
    border: 2px dashed var(--mustard);
    background:
      radial-gradient(130% 120% at 50% 0%, rgba(214,161,60,.16), transparent 60%),
      var(--cream-3);
    box-shadow: var(--shadow-soft);
    transition: border-color .2s, transform .2s, box-shadow .2s;
    cursor: pointer;
  }
  .dropzone:hover, .dropzone.drag {
    border-color: var(--sienna); transform: translateY(-2px); box-shadow: var(--shadow-lift);
  }

  /* groovy sunburst icon — rays contained inside the disc, never spilling */
  .sunburst {
    width: 96px; height: 96px; margin: 0 0 24px; position: relative; flex: none;
    border-radius: 50%;
    display: grid; place-items: center;
    background: radial-gradient(circle, var(--mustard) 0 39%, transparent 40%);
  }
  .sunburst .rays {
    content: ""; position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
    background:
      conic-gradient(from 0deg,
        var(--sienna) 0 18deg, transparent 18deg 45deg,
        var(--sienna) 45deg 63deg, transparent 63deg 90deg,
        var(--sienna) 90deg 108deg, transparent 108deg 135deg,
        var(--sienna) 135deg 153deg, transparent 153deg 180deg,
        var(--sienna) 180deg 198deg, transparent 198deg 225deg,
        var(--sienna) 225deg 243deg, transparent 243deg 270deg,
        var(--sienna) 270deg 288deg, transparent 288deg 315deg,
        var(--sienna) 315deg 333deg, transparent 333deg 360deg);
    -webkit-mask: radial-gradient(circle, transparent 0 41%, #000 42% 50%, transparent 51%);
            mask: radial-gradient(circle, transparent 0 41%, #000 42% 50%, transparent 51%);
    animation: spin 22s linear infinite;
  }
  .sunburst .arrow-up {
    position: relative; z-index: 2; line-height: 1;
    font-size: 32px; color: var(--ink); font-weight: 700;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .sunburst .rays { animation: none; } }

  .dz-head { font-family: var(--face); font-weight: 700; font-size: 22px; color: var(--ink); margin: 0; }
  .dz-sub { font-size: 14px; font-weight: 600; color: var(--ink-soft); margin: 8px 0 26px; }

  .browse {
    font-family: var(--face); font-weight: 700; font-size: 15px;
    color: var(--cream-3); background: var(--sienna);
    border: none; border-radius: 999px; padding: 13px 28px; cursor: pointer;
    box-shadow: 0 10px 24px -12px rgba(151,64,31,.95);
    transition: transform .15s, background .18s;
  }
  .browse:hover { background: var(--sienna-deep); transform: translateY(-1px); }

  /* formats — sit inside the dropzone as one cohesive zone */
  .formats {
    margin: 30px 0 0; display: flex; gap: 9px; justify-content: center; flex-wrap: wrap;
  }
  .fmt {
    font-family: var(--mono); font-size: 11.5px; font-weight: 600; letter-spacing: .08em;
    color: var(--ink-soft); padding: 5px 12px; border-radius: 999px;
    background: var(--cream-2); border: 1px solid var(--line);
  }

  .hint {
    margin: 30px auto 0; max-width: 46ch;
    font-size: 14px; font-weight: 600; color: var(--ink-soft); line-height: 1.55;
  }
  .hint a { color: var(--sienna); text-decoration: underline; text-underline-offset: 3px; text-decoration-thickness: 1.5px; }
  .hint a:hover { color: var(--sienna-deep); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a class="wordmark" href="index.html" aria-label="Galatiq Accounts Payable home">
      <span class="mark">Galatiq</span>
      <span class="desc">Accounts Payable</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Inbox</a>
      <a href="audit.html">Audit</a>
    </div>
    <div class="nav-right">
      <span class="org-pill">Acme Corp</span>
      <a href="upload.html"><button class="btn-upload">Upload invoice</button></a>
      <span class="whoami"><span class="avatar">DO</span> Dana Okafor</span>
    </div>
  </div>
</nav>

<main class="shell">
  <div class="stage">
    <div class="up-wrap">
      <p class="eyebrow rise" style="animation-delay:.04s">New invoice</p>
      <h1 class="up-title rise" style="animation-delay:.1s">Drop an invoice to process.</h1>

      <label class="dropzone rise" style="animation-delay:.16s" id="dz" for="file">
        <span class="sunburst" aria-hidden="true">
          <span class="rays"></span>
          <span class="arrow-up">&uarr;</span>
        </span>
        <p class="dz-head">Drag &amp; drop it here</p>
        <p class="dz-sub">or</p>
        <button class="browse" type="button" onclick="document.getElementById('file').click()">Browse files</button>
        <input id="file" type="file" accept=".pdf,.csv,.json,.xml,.txt" hidden />
        <div class="formats">
          <span class="fmt">PDF</span>
          <span class="fmt">CSV</span>
          <span class="fmt">JSON</span>
          <span class="fmt">XML</span>
          <span class="fmt">TXT</span>
        </div>
      </label>

      <p class="hint rise" style="animation-delay:.22s">
        Processing runs in the background — watch it move through your <a href="index.html">inbox</a>.
      </p>
    </div>
  </div>
</main>

<footer class="foot">
  <span><span class="sun"></span>Galatiq — autonomous accounts payable</span>
  <span>Acme Corp &middot; signed in as Dana Okafor</span>
</footer>

<script>
  // purely cosmetic drag affordance; no upload happens in the mock
  const dz = document.getElementById('dz');
  ['dragenter','dragover'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.add('drag'); }));
  ['dragleave','drop'].forEach(e => dz.addEventListener(e, ev => { ev.preventDefault(); dz.classList.remove('drag'); }));

  // Safety net: force entrance content visible if the keyframe never advances.
  setTimeout(() => document.querySelectorAll('.rise').forEach(el => {
    el.style.opacity = '1'; el.style.transform = 'none';
  }), 700);
</script>

</body>
</html>

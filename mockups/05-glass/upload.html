<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Galatiq · Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Newsreader:ital,opsz@0,6..72;1,6..72&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .stage {
    min-height: 60vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center;
  }
  .stage .eyebrow { margin-bottom: 14px; }
  .stage h1 {
    font-family: var(--font-display); font-weight: 360;
    font-size: clamp(34px, 4.4vw, 52px); letter-spacing: -0.025em; line-height: 1.05;
    margin: 0; color: var(--ink);
  }
  .stage h1 em { font-style: italic; color: var(--aqua-deep); }

  .drop {
    width: min(620px, 100%);
    margin-top: 40px;
    padding: 56px 40px;
    border-radius: 28px;
    cursor: pointer;
    background: var(--glass);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border: 1.5px dashed var(--glass-edge);
    box-shadow: var(--shadow-soft), var(--shadow-inset);
    transition: transform 0.25s cubic-bezier(.22,1,.36,1), border-color 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .drop:hover, .drop.over {
    transform: translateY(-3px);
    border-color: var(--aqua);
    background: var(--glass-strong);
    box-shadow: var(--shadow-lift), 0 0 0 4px var(--aqua-glow), var(--shadow-inset);
  }
  .drop .ring {
    width: 84px; height: 84px; margin: 0 auto 22px;
    border-radius: 50%;
    display: grid; place-items: center;
    color: var(--aqua-deep);
    background: radial-gradient(circle at 50% 30%, rgba(255,255,255,0.9), var(--aqua-wash));
    box-shadow: inset 0 0 0 1px var(--glass-border), 0 10px 24px -12px var(--aqua-glow);
  }
  .drop.over .ring { animation: bob 1.2s ease-in-out infinite; }
  @keyframes bob { 50% { transform: translateY(-6px); } }
  .drop .ring svg { width: 36px; height: 36px; }
  .drop .big { font-family: var(--font-display); font-weight: 380; font-size: 24px; letter-spacing: -0.01em; color: var(--ink); }
  .drop .or { font-size: 13.5px; color: var(--ink-faint); margin: 10px 0 18px; }

  .browse {
    display: inline-flex; align-items: center; gap: 9px;
    padding: 11px 22px; border-radius: 999px;
    font-family: var(--font-text); font-size: 14px; font-weight: 600; cursor: pointer;
    color: #f4fbfc;
    background: linear-gradient(135deg, var(--aqua) 0%, var(--aqua-deep) 100%);
    border: none;
    box-shadow: 0 12px 26px -12px var(--aqua-glow), var(--shadow-inset);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
  }
  .browse:hover { transform: translateY(-1px); box-shadow: 0 18px 34px -12px var(--aqua-glow); }
  .browse svg { width: 16px; height: 16px; }

  .formats {
    display: flex; justify-content: center; flex-wrap: wrap; gap: 8px;
    margin-top: 26px;
  }
  .formats .fmt {
    font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em;
    padding: 4px 11px; border-radius: 999px;
    color: var(--ink-soft); background: rgba(255,255,255,0.5);
    border: 1px solid var(--glass-edge);
  }

  .hint {
    margin-top: 30px;
    font-family: var(--font-edit); font-style: italic; font-size: 15px;
    color: var(--ink-soft);
  }
  .hint a { color: var(--aqua-deep); border-bottom: 1px solid var(--aqua-glow); }
</style>
</head>
<body>
<div class="atmos"><span></span><span></span><span></span></div>

<div class="shell">
  <nav class="nav reveal">
    <a class="brand" href="index.html">
      <span class="mark">Galatiq</span>
      <span class="desc">Accounts&nbsp;Payable</span>
    </a>
    <div class="navlinks">
      <a href="index.html">Inbox</a>
      <a href="audit.html">Audit</a>
    </div>
    <span class="spacer"></span>
    <a class="btn-upload" href="upload.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V6M5 12l7-7 7 7"/></svg>
      Upload invoice
    </a>
    <div class="who">
      <span class="avatar">DO</span>
      <div>
        <div class="name">Dana Okafor</div>
        <div class="org">Acme Corp</div>
      </div>
    </div>
  </nav>

  <div class="stage">
    <p class="eyebrow reveal">Upload</p>
    <h1 class="reveal" style="animation-delay:.04s">Hand it to the <em>agents</em>.</h1>

    <label class="drop reveal" id="drop" for="file" style="animation-delay:.08s">
      <span class="ring">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4M7 9l5-5 5 5"/><path d="M5 16v2a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-2"/></svg>
      </span>
      <div class="big">Drop an invoice to process.</div>
      <div class="or">or</div>
      <span class="browse">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Browse files
      </span>
      <input id="file" type="file" accept=".pdf,.csv,.json,.xml,.txt" hidden />
      <div class="formats">
        <span class="fmt">PDF</span>
        <span class="fmt">CSV</span>
        <span class="fmt">JSON</span>
        <span class="fmt">XML</span>
        <span class="fmt">TXT</span>
      </div>
    </label>

    <p class="hint reveal" style="animation-delay:.08s">
      Processing runs in the background — watch it move through your <a href="index.html">inbox</a>.
    </p>
  </div>

  <p class="foot reveal" style="animation-delay:.11s">
    <span class="mark">Galatiq</span> · clean invoices pay themselves.
  </p>
</div>

<script>
  // Dropzone affordance only — no upload, this is a mock.
  const drop = document.getElementById('drop');
  ['dragenter','dragover'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.add('over'); }));
  ['dragleave','drop'].forEach(e => drop.addEventListener(e, ev => { ev.preventDefault(); drop.classList.remove('over'); }));
</script>
</body>
</html>

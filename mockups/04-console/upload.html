<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Galatiq · AP — Upload</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="console.css" />
</head>
<body>

<nav class="nav">
  <div class="nav-in">
    <a class="brand" href="index.html" aria-label="Galatiq Accounts Payable home">
      <span class="prompt">&gt;_</span>
      <span class="word">Galatiq</span>
      <span class="desc">Accounts Payable</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Inbox</a>
      <a href="vendors.html">Vendors</a>
      <a href="audit.html">Audit</a>
    </div>
    <div class="nav-right">
      <a class="btn-upload" href="upload.html" aria-current="page">+ Upload invoice</a>
      <span class="who"><span class="dot" aria-hidden="true"></span>Dana Okafor<span class="org">· Acme Corp</span></span>
    </div>
  </div>
</nav>

<main>
  <div class="upload-wrap">
    <div class="upload-inner">
      <div class="eyebrow reveal" style="animation-delay:.04s">new document</div>

      <label class="dropzone reveal" id="zone" style="animation-delay:.10s" for="file">
        <div class="glyph" aria-hidden="true">⇪</div>
        <h1>Drop an invoice to process.</h1>
        <div class="or">— or —</div>
        <span class="browse">Browse files</span>
        <input id="file" type="file" accept=".pdf,.csv,.json,.xml,.txt" hidden multiple />
      </label>

      <div class="formats reveal" style="animation-delay:.16s" aria-label="Accepted formats">
        <span class="fmt">PDF</span>
        <span class="fmt">CSV</span>
        <span class="fmt">JSON</span>
        <span class="fmt">XML</span>
        <span class="fmt">TXT</span>
      </div>

      <p class="upload-hint reveal" style="animation-delay:.22s">
        <span class="ar">&rarr;</span> Processing runs in the background — watch it move through your inbox.
      </p>
    </div>
  </div>
</main>

<div class="khint" aria-hidden="true">
  <span><kbd>Esc</kbd> inbox</span>
  <span><kbd>B</kbd> browse</span>
</div>

<script>
  var zone = document.getElementById("zone");
  var file = document.getElementById("file");

  ["dragenter", "dragover"].forEach(function (ev) {
    zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.add("drag"); });
  });
  ["dragleave", "drop"].forEach(function (ev) {
    zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.remove("drag"); });
  });
  zone.addEventListener("drop", function (e) {
    var n = e.dataTransfer && e.dataTransfer.files ? e.dataTransfer.files.length : 0;
    if (n) window.location.href = "index.html";
  });
  file.addEventListener("change", function () {
    if (file.files.length) window.location.href = "index.html";
  });

  document.addEventListener("keydown", function (e) {
    if (e.target.matches("input, textarea")) return;
    var k = e.key.toLowerCase();
    if (e.key === "Escape") window.location.href = "index.html";
    if (k === "b") file.click();
  });
</script>
</body>
</html>

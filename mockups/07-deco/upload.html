<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Galatiq · Upload Invoice</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="deco.css" />
<script>document.documentElement.className += " anim";</script>
</head>
<body>

  <nav class="nav">
    <a class="wordmark" href="index.html" aria-label="Galatiq Accounts Payable home">
      <span class="mark">Galat<b>i</b>q</span>
      <span class="descriptor">Accounts Payable</span>
    </a>
    <div class="nav-links">
      <a href="index.html">Inbox</a>
      <a href="vendors.html">Vendors</a>
      <a href="audit.html">Audit</a>
    </div>
    <a class="btn-upload" href="upload.html" aria-current="page">Upload Invoice</a>
    <div class="user">
      <span>Dana Okafor</span>
      <span class="monogram" aria-hidden="true">DO</span>
    </div>
  </nav>
  <div class="nav-rule"><div class="double"></div></div>

  <main class="shell">

    <header class="rise d1" style="text-align:center;margin-bottom:38px">
      <p class="kicker">Acme Corp · Intake</p>
      <h1 class="page-title">Upload Invoice</h1>
    </header>

    <div class="upload-wrap">

      <label class="dropzone rise d2" id="zone" tabindex="0" role="button" aria-label="Drop an invoice to process, or browse files">
        <span class="corner tl"></span><span class="corner tr"></span>
        <span class="corner bl"></span><span class="corner br"></span>
        <div class="drop-glyph" aria-hidden="true">◆</div>
        <p class="drop-title">Drop an invoice to process.</p>
        <span class="browse" id="browse">Browse files</span>
        <input type="file" id="file" accept=".pdf,.csv,.json,.xml,.txt" hidden />
      </label>

      <div class="formats rise d3" aria-label="Accepted formats">
        <span class="fmt">PDF</span>
        <span class="fmt">CSV</span>
        <span class="fmt">JSON</span>
        <span class="fmt">XML</span>
        <span class="fmt">TXT</span>
      </div>

      <p class="upload-hint rise d4">
        Processing runs in the background — watch it move through your <a href="index.html">inbox</a>.
      </p>

    </div>
  </main>

  <footer class="foot">
    <span>Galatiq · Autonomous Accounts Payable</span>
    <span class="org">Acme Corp</span>
  </footer>

  <script>
    var zone = document.getElementById('zone');
    var input = document.getElementById('file');
    document.getElementById('browse').addEventListener('click', function (e) { e.preventDefault(); input.click(); });
    zone.addEventListener('keydown', function (e) { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); input.click(); } });
    ['dragenter', 'dragover'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.add('drag'); });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
      zone.addEventListener(ev, function (e) { e.preventDefault(); zone.classList.remove('drag'); });
    });
    zone.addEventListener('drop', function () {
      window.location.href = 'index.html';
    });
    input.addEventListener('change', function () {
      if (input.files && input.files.length) window.location.href = 'index.html';
    });
  </script>

</body>
</html>
